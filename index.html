<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK Construction | Premium Builders</title>
    <!-- Modern Architecture Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <!-- Intro Animation Screen -->
    <div class="intro-screen">
        <!-- The laser line drawing from edge -->
        <div class="intro-line"></div>
        
        <!-- Center Logo Animation -->
        <div class="logo-container">
            <svg class="house-svg" viewBox="0 0 100 110" stroke="currentColor" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <path class="roof-path" d="M5,65 L50,20 L95,65" />
                <path class="chimney-path" d="M75,45 L75,25 L85,25 L85,55" />
                <path class="base-path" d="M20,65 L20,105 L80,105 L80,65" />
                <path class="door-path" d="M40,105 L40,75 L60,75 L60,105" />
            </svg>
            <h1 class="intro-title">
                <div class="bk-letters">
                    <span class="letter">B</span>
                    <span class="letter">K</span>
                </div>
                <div class="word-wrapper">
                    <span class="word">CONSTRUCTION</span>
                </div>
            </h1>
        </div>
    </div>

    <!-- Main Website Content -->
    <main class="main-content">
        <header class="header">
            <div class="nav-logo">
                <span class="bk">BK.</span>
            </div>
            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Projects</a>
                <a href="#">Services</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
            <div class="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>
        
        <section class="hero">
            <div class="hero-content">
                <div class="hero-badge">A Legacy of Excellence</div>
                <h2>Building<br>The Future</h2>
                <p>Premium construction services engineered for excellence. We turn structural visions into magnificent realities with uncompromising precision.</p>
                <a href="#" class="cta-btn">
                    <span>Explore Our Work</span>
                    <div class="btn-glow"></div>
                </a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
